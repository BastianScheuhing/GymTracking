<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracking</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Version + Settings -->
    <div id="appVersion">
        v1.1.1
        <span id="settingsIcon" onclick="openSettingsMenu()">⚙️</span>
    </div>

    <!-- Navigation -->
    <div class="bottom-nav">
        <button id="tab-dashboard" onclick="showPage('dashboard')">
            📊
            <span>Dashboard</span>
        </button>

        <button id="tab-history" onclick="showPage('history')">
            🕒
            <span>Historie</span>
        </button>

        <button id="tab-exercises" onclick="showPage('exercises')">
            🏋️
            <span>Übungen</span>
        </button>

        <button id="tab-plans" onclick="showPage('plans')">
            📋
            <span>Pläne</span>
        </button>

        <button id="tab-tracking" onclick="showPage('tracking')">
            ⏱️
            <span>Tracking</span>
        </button>
    </div>

    <!-- Seiten -->

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page">
        <h2>Dashboard</h2>

        <h3>Insights</h3>
        <div id="insightsBox"></div>

        <h3>Historie (nach Wochen)</h3>
        <div id="historyBox"></div>
    </div>

    <!-- HISTORIE -->
    <div id="page-history" class="page">
        <h2>Historie</h2>
        <ul id="overviewList"></ul>
        <div id="overviewDetails"></div>
    </div>

    <!-- ÜBUNGEN -->
    <div id="page-exercises" class="page">
        <h2>Übungen</h2>

        <!-- Kategorien (minimierbar) -->
        <h3 onclick="toggleCollapse('catBox')">
            Kategorien <span id="arrow-catBox">▾</span>
        </h3>
        <div id="catBox">
            <input id="newCategory" placeholder="Neue Kategorie">
            <button onclick="addCategory()">Hinzufügen</button>
            <ul id="categoryList"></ul>
        </div>

        <!-- Alle Übungen (minimierbar) -->
        <h3 onclick="toggleCollapse('allExBox')">
            Alle Übungen <span id="arrow-allExBox">▾</span>
        </h3>
        <div id="allExBox">

            <h4>Übung hinzufügen</h4>
            <input id="exerciseName" placeholder="Übungsname">
            <select id="exerciseCategory"></select>
            <button onclick="addExercise()">Hinzufügen</button>

            <ul id="exerciseList"></ul>
        </div>
    </div>

    <!-- PLÄNE -->
    <div id="page-plans" class="page">
        <h2>Trainingspläne</h2>

        <input id="planName" placeholder="Planname">
        <button onclick="createPlan()">Plan erstellen</button>

        <div id="planList"></div>
    </div>

    <!-- TRACKING -->
    <div id="page-tracking" class="page">
        <h2>Workout Tracking</h2>

        <label>Plan auswählen:</label>
        <select id="trackingPlanSelect"></select>
        <button onclick="startTracking()">Starten</button>

        <p id="trackingStartTime"></p>

        <div id="trackingArea"></div>
    </div>

    <!-- Popup Overlay -->
    <div id="popupOverlay" class="popup-overlay"></div>

    <script src="app.js"></script>
</body>
</html>
