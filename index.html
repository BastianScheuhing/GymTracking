<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Cache verhindern -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Vibe App</title>

    <!-- Versionierte Dateien -->
    <link rel="stylesheet" href="style.css?v=1.0.7">
</head>
<body>

    <!-- Version oben rechts -->
    <div id="appVersion">v1.0.7</div>

    <!-- Seiten -->
    <section id="page-overview" class="page active">
        <h2>Übersicht</h2>
        <ul id="overviewList"></ul>
        <div id="overviewDetails"></div>
    </section>

    <section id="page-exercises" class="page">
        <h2>Übungen</h2>

        <!-- Kategorien (collapsible) -->
        <div class="collapsible" onclick="toggleCollapse('catBox')">
            <span>Kategorien</span>
            <span class="arrow" id="arrow-catBox">▾</span>
        </div>
        <div id="catBox" class="collapse-content">
            <input id="newCategory" placeholder="Neue Kategorie" />
            <button onclick="addCategory()">Kategorie hinzufügen</button>
            <ul id="categoryList"></ul>
        </div>

        <!-- Alle Übungen (collapsible) -->
        <div class="collapsible" onclick="toggleCollapse('exerciseBox')">
            <span>Alle Übungen</span>
            <span class="arrow" id="arrow-exerciseBox">▾</span>
        </div>
        <div id="exerciseBox" class="collapse-content">
            <h3>Neue Übung</h3>
            <input id="exerciseName" placeholder="Name der Übung" />
            <select id="exerciseCategory"></select>
            <button onclick="addExercise()">Hinzufügen</button>

            <h3>Übungen</h3>
            <ul id="exerciseList"></ul>
        </div>
    </section>

    <section id="page-plans" class="page">
        <h2>Trainingspläne</h2>

        <h3>Neuen Plan erstellen</h3>
        <input id="planName" placeholder="Planname" />
        <button onclick="createPlan()">Plan erstellen</button>

        <!-- Pläne (gesamt collapsible) -->
        <div class="collapsible" onclick="toggleCollapse('planBox')">
            <span>Pläne</span>
            <span class="arrow" id="arrow-planBox">▾</span>
        </div>
        <div id="planBox" class="collapse-content">
            <ul id="planList"></ul>
        </div>
    </section>

    <section id="page-tracking" class="page">
        <h2>Tracking</h2>

        <h3>Workout starten</h3>
        <select id="trackingPlanSelect"></select>
        <button onclick="startTracking()">Starten</button>
        <p id="trackingStartTime" style="color:#777; font-size:13px; margin-top:10px;"></p>

        <div id="trackingArea" style="margin-top:20px;"></div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button onclick="showPage('overview')" id="tab-overview">🏠<span>Übersicht</span></button>
        <button onclick="showPage('exercises')" id="tab-exercises">🏋️<span>Übungen</span></button>
        <button onclick="showPage('plans')" id="tab-plans">📋<span>Pläne</span></button>
        <button onclick="showPage('tracking')" id="tab-tracking">▶️<span>Tracking</span></button>
    </nav>

    <script src="app.js?v=1.0.7"></script>
</body>
</html>
