<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Gym Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <div id="appVersion">
        <span id="appVersionText"></span>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="changelogIcon" onclick="openChangelog()">📋</span>
            <span id="settingsIcon" onclick="openSettingsMenu()">⚙️</span>
        </div>
    </div>

    <!-- POPUP OVERLAY -->
    <div id="popupOverlay" class="popup-overlay"></div>

	

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h2 style="margin:0;">Dashboard</h2>
            <button onclick="openDashboardSettings()" style="font-size:13px; padding:6px 12px; margin:0; background:#f0f0f5; color:#333;">⚙️ Anpassen</button>
        </div>
        <div id="dashboardContent"></div>
    </div>

    <!-- HISTORIE -->
    <div id="page-history" class="page">
        <h2>Historie</h2>

        <div id="overviewList"></div>
        <div id="overviewDetails"></div>
    </div>

    <!-- TRACKING -->
    <div id="page-tracking" class="page">
        <h2>Tracking</h2>

        <div class="tracking-start-area">
            <h3>Plan auswählen</h3>
            <select id="trackingPlanSelect"></select>
            <button onclick="startTracking()">Workout starten</button>
        </div>

        <div class="tracking-start-area">
            <h3>Freies Training</h3>
            <button onclick="startFreeTraining()">Freies Training starten</button>
        </div>

        <p id="trackingStartTime" style="margin-top:4px; color:#888; font-size:13px;"></p>

        <div id="restTimerCard"></div>

        <div id="trackingArea" style="margin-top:8px;"></div>
    </div>

    <!-- ÜBUNGEN -->
    <div id="page-exercises" class="page">
        <h2>Übungen</h2>

        <!-- Search -->
        <div class="ex-search-wrap">
            <input id="exerciseSearch" placeholder="🔍  Suchen…" oninput="renderExercises()" autocomplete="off">
        </div>

        <!-- Add form (collapsible) -->
        <div class="ex-add-card">
            <div class="ex-add-header" onclick="toggleCollapse('exAddBody')">
                <span>Übung hinzufügen</span>
                <span id="arrow-exAddBody">▸</span>
            </div>
            <div id="exAddBody" style="display:none; padding:0 16px 16px;">
                <input id="exerciseName" placeholder="Name der Übung">
                <select id="exerciseCategory"></select>
                <button onclick="addExercise()" style="width:100%; margin-top:4px;">Hinzufügen</button>
            </div>
        </div>

        <!-- Exercise list grouped by category -->
        <div id="exerciseList"></div>

        <!-- Category management (collapsible) -->
        <div class="ex-cat-section">
            <div class="ex-section-toggle" onclick="toggleCollapse('catManageBody')">
                <span>Kategorien verwalten</span>
                <span id="arrow-catManageBody">▸</span>
            </div>
            <div id="catManageBody" style="display:none;">
                <div style="display:flex; gap:8px; margin:12px 0 8px;">
                    <input id="newCategory" placeholder="Neue Kategorie" style="flex:1; margin:0;">
                    <button onclick="addCategory()" style="margin:0; white-space:nowrap;">Hinzufügen</button>
                </div>
                <div id="categoryList"></div>
            </div>
        </div>
    </div>

    <!-- PLÄNE -->
    <div id="page-plans" class="page">
        <h2>Trainingspläne</h2>

        <div class="ex-add-card">
            <div class="ex-add-header" onclick="toggleCollapse('planAddBody')">
                <span>Plan erstellen</span>
                <span id="arrow-planAddBody">▸</span>
            </div>
            <div id="planAddBody" style="display:none; padding:0 16px 16px;">
                <input id="planName" placeholder="Planname" style="margin:12px 0 8px;">
                <button onclick="createPlan()" style="width:100%; margin:0;">Erstellen</button>
            </div>
        </div>

        <div id="planList"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="bottom-nav">
        <button id="tab-dashboard" class="active" onclick="showPage('dashboard')">🏠<span>Dashboard</span></button>
        <button id="tab-history" onclick="showPage('history')">📅<span>Historie</span></button>
        <button id="tab-tracking" onclick="showPage('tracking')">⏱️<span>Tracking</span></button>
        <button id="tab-exercises" onclick="showPage('exercises')">💪<span>Übungen</span></button>
        <button id="tab-plans" onclick="showPage('plans')">📘<span>Pläne</span></button>
    </div>


    <script src="musclemap-data.js"></script>
    <script src="app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js", { updateViaCache: "none" });
        }
    </script>
</body>
</html>
